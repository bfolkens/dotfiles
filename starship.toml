# Plugins

[custom.jj]
command = "prompt"
format = "$output"
# ignore_timeout = true
shell = ["starship-jj", "--ignore-working-copy", "starship"]
use_stdin = false
when = true

[custom.oci]
command = "echo $OCI_CLI_PROFILE"
when = "test -n \"$OCI_CLI_PROFILE\""
symbol = "¯î¢ "
style = "bold #F0CC72"
format = "on [$symbol($output)]($style) "
