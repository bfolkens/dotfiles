# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

right_format = "$cmd_duration"
format = """
$username\
$hostname\
$localip\
$shlvl\
$singularity\
$vcsh\
$memory_usage\
$aws\
$gcloud\
${env_var.OCI_CLI_PROFILE}\
$openstack\
$azure\
$kubernetes\
$nix_shell\
$env_var\
$line_break\
$git_branch\
$git_commit\
$git_state\
$git_metrics\
$git_status\
${custom.jj}\
$line_break\
$sudo\
$directory\
$direnv\
$jobs\
$time\
$status\
$package\
$shell\
$character"""

[cmd_duration]
format = "[$duration](dimmed)"
min_time = 2_000
show_milliseconds = true

[status]
disabled = false
symbol = "Ô£û"

[git_metrics]
disabled = true

[git_status]
# using jj-starship
disabled = true

[git_commit]
# using jj-starship
disabled = true

[git_state]
# using jj-starship
disabled = true

[git_branch]
symbol = "´Éÿ "
format = "[$symbol$branch(:$remote_branch)]($style) "
# using jj-starship
disabled = true

[kubernetes]
disabled = false
style = "blue bold"
format = 'on [$symbol$context( \($namespace\))]($style) '
detect_folders = ['deploy']

